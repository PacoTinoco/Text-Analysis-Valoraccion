# ── EvalPlatform – Nginx reverse proxy ────────────────────────────────────────
# Used in production only (docker-compose.prod.yml).
# Nginx acts as the single entry point on port 80, routing:
#   /api/v1/*  →  Python API container (port 8000)
#   everything else  →  Next.js frontend container (port 3000)
#
# This way users only need one URL (your domain or server IP) and you never
# expose the API or frontend ports directly to the internet.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Increase body size for file uploads (must match MAX_FILE_SIZE_MB)
    client_max_body_size 110M;

    # Upstream services (Docker Compose service names)
    upstream api {
        server api:8000;
    }

    upstream web {
        server web:3000;
    }

    server {
        listen 80;
        server_name _;  # Matches any hostname; replace with your domain in production

        # ── API routes ─────────────────────────────────────────────────────────
        location /api/v1/ {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Generous timeouts for large file uploads and long analysis tasks
            proxy_connect_timeout 60s;
            proxy_send_timeout    300s;
            proxy_read_timeout    300s;
        }

        # ── Frontend ───────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://web;
            proxy_http_version 1.1;
            # Required for Next.js hot-reload WebSocket (dev) and SSE
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
